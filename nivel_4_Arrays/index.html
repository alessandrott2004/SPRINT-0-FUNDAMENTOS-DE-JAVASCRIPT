<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restaurante El exquisito de huancayo</title>
  <style>
    .normal  { color: black; }
    .bajo    { color: orange; font-weight: bold; }
    .agotado { color: red;    font-weight: bold; }
    .mensaje          { font-weight: bold; padding: 8px; border-radius: 4px; }
    .mensaje.procesando { color: #1a6fc4; background: #e8f0fe; }
    .mensaje.exito      { color: #1e7e34; background: #d4edda; }
    .mensaje.error      { color: #721c24; background: #f8d7da; }
  </style>
</head>
<body>
  <h1>Menú del Restaurante</h1>

  <button id="btnMostrar">Mostrar menú</button>
  <button id="btnAgregar">Agregar plato demo</button>

  <hr>
  <h2>Herramientas</h2>

  <input id="inputBuscar" placeholder="Buscar plato por nombre" />
  <button id="btnBuscar">Buscar</button>
  <button id="btnStockBajo">Ver stock bajo (&lt;= 3)</button>
  <button id="btnResumen">Ver resumen</button>

  <hr>
  <h2>Vender</h2>
  <input id="inputVenderNombre" placeholder="Nombre del plato" />
  <input id="inputVenderCantidad" placeholder="Cantidad" type="number" />
  <button id="btnVender">Vender</button>

  <div id="output"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
